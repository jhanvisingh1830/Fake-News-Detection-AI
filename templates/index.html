<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fake News Detection AI</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, sans-serif;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(
                135deg,
                #141e30,
                #243b55
            );
        }

        .container{

            width: 700px;

            background: rgba(255,255,255,0.1);

            backdrop-filter: blur(10px);

            padding: 40px;

            border-radius: 20px;

            box-shadow: 0 8px 32px rgba(0,0,0,0.3);

            text-align: center;

            color: white;
        }

        h1{
            margin-bottom: 25px;
            font-size: 36px;
        }

        textarea{

            width: 100%;
            height: 220px;

            border: none;
            outline: none;

            border-radius: 15px;

            padding: 15px;

            font-size: 16px;

            resize: none;

            margin-bottom: 20px;
        }

        button{

            background: #00c6ff;

            border: none;

            padding: 14px 35px;

            border-radius: 10px;

            font-size: 18px;

            cursor: pointer;

            transition: 0.3s;

            color: white;

            font-weight: bold;
        }

        button:hover{

            background: #0072ff;

            transform: scale(1.05);
        }

        .result{

            margin-top: 25px;

            font-size: 28px;

            font-weight: bold;
        }

        .fake{
            color: #ff4b5c;
        }

        .real{
            color: #00ff9d;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Fake News Detection AI</h1>

        <form action="/predict" method="POST">

            <textarea
                name="news"
                placeholder="Paste news article here..."
            ></textarea>

            <br>

            <button type="submit">
                Predict News
            </button>

        </form>

        {% if prediction %}

            <div class="result">

                {% if prediction == "Fake News" %}

                    <span class="fake">
                        {{ prediction }}
                    </span>

                {% else %}

                    <span class="real">
                        {{ prediction }}
                    </span>

                {% endif %}
            <br><br>

<div style="font-size:20px;">
    Confidence: {{ confidence }}%
</div>
        {% endif %}

    </div>

</body>

</html>
